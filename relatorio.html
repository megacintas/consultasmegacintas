<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MegaCintas - Envio de Relatório</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    min-height: 100vh;
    background: black;
}

/* FUNDO */
.video-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: brightness(0.35);
}

.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,165,0,0.15), rgba(0,0,0,0.9));
    z-index: -1;
}

/* HEADER */
header {
    padding: 25px;
    text-align: center;
}

header img {
    height: 90px;
    filter: drop-shadow(0 0 15px orange);
}

/* TÍTULOS */
h1 {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 32px;
}

.subtitulo {
    text-align: center;
    color: #ccc;
    margin-bottom: 40px;
}

/* CONTAINER */
.form-container {
    max-width: 420px;
    margin: auto;
    padding: 35px 30px;
    background: linear-gradient(180deg, #0b0b0b, #000);
    border-radius: 20px;
    box-shadow:
        inset 0 0 0 1px rgba(255,165,0,0.25),
        0 25px 60px rgba(0,0,0,0.7);
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

label {
    font-size: 14px;
    color: #ccc;
}

input[type="text"],
input[type="email"] {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255,165,0,0.25);
}

input:focus {
    box-shadow:
        inset 0 0 0 1px orange,
        0 0 10px rgba(255,165,0,0.3);
}

/* UPLOAD CUSTOM */
.upload-box {
    padding: 22px;
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    background: linear-gradient(180deg, #0b0b0b, #000);
    box-shadow:
        inset 0 0 0 1px rgba(255,165,0,0.35),
        0 15px 35px rgba(0,0,0,0.7);
    transition: 0.35s ease;
}

.upload-box:hover {
    transform: translateY(-4px);
    box-shadow:
        inset 0 0 0 1px orange,
        0 25px 55px rgba(255,165,0,0.35);
}

.upload-title {
    font-size: 16px;
    font-weight: bold;
    color: orange;
}

.upload-sub {
    font-size: 12px;
    color: #aaa;
    margin-top: 5px;
}

.file-name {
    font-size: 13px;
    color: #ccc;
    text-align: center;
}

/* BOTÃO */
button {
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(180deg, #ff9900, #cc7700);
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(255,165,0,0.35);
    transition: 0.35s ease;
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 55px rgba(255,165,0,0.55);
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="videos/fundo.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
    <img src="imagens/logo.png" alt="Mega Cintas">
</header>

<h1>Envio de Relatório</h1>
<p class="subtitulo">Anexe o relatório em PDF ou Word</p>

<div class="form-container">
<form 
  action="https://formsubmit.co/relatorio@megacintas.com.br"
  method="POST"
  enctype="multipart/form-data"
>

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="Novo Relatório Recebido">

    <label>Nome</label>
    <input type="text" name="nome" required>

    <label>E-mail</label>
    <input type="email" name="email" required>

    <input 
      type="file"
      id="arquivo"
      name="arquivo"
      accept=".pdf,.doc,.docx"
      required
      hidden
    >

    <label for="arquivo" class="upload-box">
        <div class="upload-title">Selecionar Arquivo</div>
        <div class="upload-sub">PDF ou Word (.doc, .docx)</div>
    </label>

    <div class="file-name" id="file-name">Nenhum arquivo selecionado</div>

    <button type="submit">Enviar Relatório</button>

</form>
</div>

<script>
document.getElementById("arquivo").addEventListener("change", function () {
    const nome = this.files.length ? this.files[0].name : "Nenhum arquivo selecionado";
    document.getElementById("file-name").textContent = nome;
});
</script>

</body>
</html>
